        function spawnFood(count = 1) {
            for (let i = 0; i < count; i++) {
                let valid = false;
                let attempts = 0;
                while (!valid && attempts < 50) {
                    const foodType = FOOD_COLORS[Math.floor(Math.random() * FOOD_COLORS.length)];
                    let newFood;

                    // 20%在蛇头附近生成，80%在世界随机位置均匀分布
                    if (Math.random() < 0.2 && snake.length > 0) {
                        // 在蛇头附近生成
                        const head = snake[0];
                        const range = 15; // 附近范围
                        newFood = {
                            x: head.x + (Math.random() - 0.5) * range * 2,
                            y: head.y + (Math.random() - 0.5) * range * 2,
                            emoji: foodType.emoji,
                            color: foodType.color,
                            glow: foodType.glow,
                            value: foodType.value,
                            pulse: Math.random() * Math.PI * 2
                        };
                    } else {
                        // 在世界随机位置均匀生成
                        newFood = {
                            x: Math.floor(Math.random() * WORLD_SIZE),
                            y: Math.floor(Math.random() * WORLD_SIZE),
                            emoji: foodType.emoji,
                            color: foodType.color,
                            glow: foodType.glow,
                            value: foodType.value,
                            pulse: Math.random() * Math.PI * 2
                        };
                    }

                    const overlapSnake = snake.some(s => Math.abs(s.x - newFood.x) < 3 && Math.abs(s.y - newFood.y) < 3);
                    const overlapFood = foods.some(f => Math.abs(f.x - newFood.x) < 3 && Math.abs(f.y - newFood.y) < 3);

                    if (!overlapSnake && !overlapFood) {
                        foods.push(newFood);
                        valid = true;
                    }
                    attempts++;
                }
            }

            // 保持足够食物（增加到50个）
            while (foods.length < 50) {
                spawnFood(1);
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.5;
                const speed = 1 + Math.random() * 3;
                particles.push({
                    x: x * GRID_SIZE + GRID_SIZE / 2,
                    y: y * GRID_SIZE + GRID_SIZE / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color: color
                });
            }
        }

        // 创建分数弹出效果
        function createScorePopup(x, y, score, foodColor) {
            // 检查是否是连杀文字
            if (typeof score === 'string') {
                // 连杀文字直接使用网格坐标
                scorePopups.push({
                    x: x,
                    y: y,
                    score: score,
                    life: 1.5,
                    color: foodColor,
                    isKillText: true
                });
            } else {
                // 普通分数使用像素坐标
                scorePopups.push({
                    x: x * GRID_SIZE + GRID_SIZE / 2,
                    y: y * GRID_SIZE + GRID_SIZE / 2,
                    score: score,
                    life: 1,
                    color: foodColor
                });
            }
        }

        function updateScorePopups() {
            for (let i = scorePopups.length - 1; i >= 0; i--) {
                const p = scorePopups[i];
                // 连杀文字移动更慢
                if (p.isKillText) {
                    p.y -= 0.8;
                    p.life -= 0.015;
                } else {
                    p.y -= 1.5;
                    p.life -= 0.02;
                }
                if (p.life <= 0) scorePopups.splice(i, 1);
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // 绘制分数弹出文字
        function drawScorePopups() {
            scorePopups.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;

                if (p.isKillText) {
                    // 连杀文字样式
                    ctx.font = 'bold 28px Arial';
                    ctx.fillStyle = p.color;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.strokeText(p.score, p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2);
                    ctx.fillText(p.score, p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2);
                } else {
                    // 普通分数样式
                    ctx.font = 'bold 18px Arial';
                    ctx.fillStyle = '#ffffff';
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 4;
                    const text = '+' + p.score;
                    ctx.strokeText(text, p.x, p.y);
                    ctx.fillText(text, p.x, p.y);
                }
                ctx.restore();
            });
        }

        // 平滑方向变化
        function smoothDirection() {
            // 计算角度差，处理 -PI 到 PI 的跳变
            let diff = targetDirection - direction;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;

            // 平滑转向
            const turnSpeed = isBoosting ? 0.3 : 0.15;
            direction += diff * turnSpeed;

            // 规范化到 -PI 到 PI
            while (direction > Math.PI) direction -= Math.PI * 2;
            while (direction < -Math.PI) direction += Math.PI * 2;
        }

        // 绘制星星形状
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function draw() {
            // 更新相机位置（平滑跟随蛇头）
            const targetCamX = snake[0].x * GRID_SIZE - canvas.width / 2;
            const targetCamY = snake[0].y * GRID_SIZE - canvas.height / 2;
            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;

            // 背景 - 只显示可移动区域
            const worldWidth = WORLD_SIZE * GRID_SIZE;
            const worldHeight = WORLD_SIZE * GRID_SIZE;

            // 填充默认背景（灰色外部）
            ctx.fillStyle = '#cccccc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 计算可视区域相对于世界的裁剪区域
            let sx = camera.x;
            let sy = camera.y;
            let sw = canvas.width;
            let sh = canvas.height;

            // 只绘制在可移动范围内的部分
            if (sx < 0) { sw += sx; sx = 0; }
            if (sy < 0) { sh += sy; sy = 0; }
            if (sx + sw > worldWidth) sw = worldWidth - sx;
            if (sy + sh > worldHeight) sh = worldHeight - sy;

            // 保存并裁剪到可移动区域
            ctx.save();
            ctx.beginPath();
            ctx.rect(sx - camera.x, sy - camera.y, sw, sh);
            ctx.clip();

            // 绘制可移动区域背景
            ctx.fillStyle = '#fff0f5';
            ctx.fillRect(sx - camera.x, sy - camera.y, sw, sh);

            // 靠近边界时显示红色边框提示
            // 应用相机偏移
            ctx.translate(-camera.x, -camera.y);

            // 绘制网格（在世界范围内）
            const startGridX = Math.floor(camera.x / GRID_SIZE);
            const endGridX = startGridX + Math.ceil(canvas.width / GRID_SIZE) + 1;
            const startGridY = Math.floor(camera.y / GRID_SIZE);
            const endGridY = startGridY + Math.ceil(canvas.height / GRID_SIZE) + 1;

            ctx.strokeStyle = 'rgba(255,182,193,0.3)';
            ctx.lineWidth = 1;
            for (let x = startGridX; x <= endGridX; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID_SIZE, camera.y);
                ctx.lineTo(x * GRID_SIZE, camera.y + canvas.height);
                ctx.stroke();
            }
            for (let y = startGridY; y <= endGridY; y++) {
                ctx.beginPath();
                ctx.moveTo(camera.x, y * GRID_SIZE);
                ctx.lineTo(camera.x + canvas.width, y * GRID_SIZE);
                ctx.stroke();
            }

            const time = Date.now() / 1000;

            // 绘制传送门（经典模式）
            if (gameMode === 'classic' && portals.length > 0) {
                portals.forEach((portal, index) => {
                    const px = portal.x * GRID_SIZE + GRID_SIZE/2;
                    const py = portal.y * GRID_SIZE + GRID_SIZE/2;
                    const pulse = Math.sin(time * 3 + index) * 0.2 + 1;
                    const radius = GRID_SIZE * 1.5 * pulse;

                    ctx.save();
                    // 外圈光晕
                    const gradient = ctx.createRadialGradient(px, py, 0, px, py, radius);
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                    gradient.addColorStop(0.5, portal.color);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(px, py, radius, 0, Math.PI * 2);
                    ctx.fill();

                    // 中心
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(px, py, GRID_SIZE * 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    // 旋转效果
                    ctx.strokeStyle = portal.color;
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]);
                    ctx.lineDashOffset = -time * 30;
                    ctx.beginPath();
                    ctx.arc(px, py, GRID_SIZE * 0.8, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.restore();
                });
            }

            // 食物（使用emoji绘制）
            foods.forEach(food => {
                const pulse = Math.sin(time * 4 + food.pulse) * 0.2 + 1;
                const size = GRID_SIZE * 1.2 * pulse;
                const cx = food.x * GRID_SIZE + GRID_SIZE/2;
                const cy = food.y * GRID_SIZE + GRID_SIZE/2;

                ctx.save();
                ctx.shadowColor = food.glow;
                ctx.shadowBlur = 10;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = `${size}px Arial`;
                ctx.fillText(food.emoji, cx, cy);
                ctx.restore();
            });

            // 加速特效（画在蛇后面，在蛇身下层）
            if (isBoosting) {
                ctx.save();
                const tail = snake[snake.length - 1];
                const tailX = tail.x * GRID_SIZE + GRID_SIZE/2;
                const tailY = tail.y * GRID_SIZE + GRID_SIZE/2;

                // 多层火焰拖尾（缩短版 - 减少层数和长度）
                const colors = ['#ffff00', '#ffaa00', '#ff6600', '#ff3300', '#ff0000'];
                for (let i = 1; i <= 5; i++) {  // 从8层减少到5层
                    const alpha = 0.8 - i * 0.12;
                    const width = 10 - i;  // 宽度也稍微减小
                    const color = colors[Math.min(i - 1, colors.length - 1)];
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(
                        tailX - Math.cos(direction) * i * 10,  // 长度从15减少到10
                        tailY - Math.sin(direction) * i * 10
                    );
                    ctx.stroke();
                }
                ctx.restore();
            }

            // 蛇
            snake.forEach((segment, i) => {
                const ratio = i / Math.max(snake.length - 1, 1);
                const hue = 330 - ratio * 20; // 粉色系
                const lightness = 60 - ratio * 15;

                const padding = 1;
                const radius = 4;
                const x = segment.x * GRID_SIZE + padding;
                const y = segment.y * GRID_SIZE + padding;
                const w = GRID_SIZE - padding * 2;
                const h = GRID_SIZE - padding * 2;

                // 蛇身
                const gradient = ctx.createLinearGradient(x, y, x + w, y + h);
                gradient.addColorStop(0, `hsl(${hue}, 100%, ${lightness + 15}%)`);
                gradient.addColorStop(1, `hsl(${hue}, 100%, ${lightness - 5}%)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, radius);
                ctx.fill();

                // 蛇头
                if (i === 0) {
                    // 加速时头部特效（超大光晕：橙→黄→白）
                    if (isBoosting) {
                        ctx.save();
                        const headCenterX = x + w/2;
                        const headCenterY = y + h/2;

                        // 多层光晕效果
                        const glowLayers = [
                            { radius: 35, color: 'rgba(255, 255, 255, 0.9)' },   // 最外层白
                            { radius: 28, color: 'rgba(255, 255, 0, 0.7)' },      // 黄色
                            { radius: 22, color: 'rgba(255, 170, 0, 0.6)' },      // 橙色
                            { radius: 16, color: 'rgba(255, 100, 0, 0.5)' },       // 深橙色
                        ];

                        glowLayers.forEach(layer => {
                            ctx.fillStyle = layer.color;
                            ctx.beginPath();
                            ctx.arc(headCenterX, headCenterY, layer.radius, 0, Math.PI * 2);
                            ctx.fill();
                        });

                        // 脉冲发光
                        const pulse = Math.sin(time * 10) * 0.3 + 0.7;
                        ctx.globalAlpha = pulse;
                        ctx.shadowColor = '#ffffff';
                        ctx.shadowBlur = 25;
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(headCenterX, headCenterY, 8, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();
                    }

                    ctx.shadowColor = '#ff69b4';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#ff69b4';
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 眼睛 - 根据方向旋转
                    ctx.save();
                    ctx.translate(x + w/2, y + h/2);
                    ctx.rotate(direction);

                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(4, -4, 3, 0, Math.PI * 2);
                    ctx.arc(4, 4, 3, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(5, -3, 1.5, 0, Math.PI * 2);
                    ctx.arc(5, 3, 1.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            });

            drawParticles();
            drawScorePopups();

            // 磁吸连线特效
            const headX = snake[0].x * GRID_SIZE + GRID_SIZE/2;
            const headY = snake[0].y * GRID_SIZE + GRID_SIZE/2;
            foods.forEach(food => {
                const foodX = food.x * GRID_SIZE + GRID_SIZE/2;
                const foodY = food.y * GRID_SIZE + GRID_SIZE/2;
                const dist = Math.sqrt(Math.pow(foodX - headX, 2) + Math.pow(foodY - headY, 2));
                if (dist < GRID_SIZE * 3.5) {
                    ctx.save();
                    const alpha = 1 - dist / (GRID_SIZE * 3.5);
                    ctx.strokeStyle = `rgba(0, 255, 136, ${alpha * 0.4})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(headX, headY);
                    ctx.lineTo(foodX, foodY);
                    ctx.stroke();
                    ctx.restore();
                }
            });

            // 恢复相机偏移
            ctx.restore();

            // 绘制AI蛇
            drawAISnakes();

            // 绘制倒计时（限时挑战、大乱斗和大逃杀模式）
            if ((gameMode === 'timed' || gameMode === 'battle' || gameMode === 'chase') && isRunning) {
                drawTimer();
            }

            // 绘制小地图
            drawMiniMap();
        }

        // 绘制倒计时
        function drawTimer() {
            ctx.save();
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 背景
            const timerX = canvas.width - 80;
            const timerY = 50;
            const radius = 35;

            // 圆形背景
            ctx.beginPath();
            ctx.arc(timerX, timerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = timeRemaining <= 10 ? 'rgba(255, 71, 87, 0.9)' : 'rgba(255, 107, 129, 0.9)';
            ctx.fill();

            // 发光效果
            if (timeRemaining <= 10) {
                ctx.shadowColor = '#ff4757';
                ctx.shadowBlur = 20;
            }

            // 边框
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 文字
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 0;
            ctx.fillText(timeRemaining, timerX, timerY);

            // 闪烁效果（最后10秒）
            if (timeRemaining <= 10) {
                ctx.globalAlpha = Math.abs(Math.sin(Date.now() / 200));
                ctx.font = 'bold 14px Arial';
                ctx.fillText('⏰', timerX, timerY - 45);
            }

            ctx.restore();
        }

        // 更新大乱斗实时排名
        function updateBattleRanking() {
            if (gameMode !== 'battle' || !isRunning) return;

            const ranking = [
                { name: '你', score: score, length: snake.length, isPlayer: true },
                ...aiSnakes.filter(ai => ai.alive).map(ai => ({ name: ai.name, score: ai.score, length: ai.body.length, isPlayer: false }))
            ];
            ranking.sort((a, b) => b.score - a.score);

            const rankingList = document.getElementById('rankingList');
            if (rankingList) {
                rankingList.innerHTML = ranking.map((r, i) => {
                    const color = r.isPlayer ? '#2ecc71' : '#fff';
                    const star = r.isPlayer ? ' ⭐' : '';
                    return `<div style="color:${color}">${i + 1}. ${r.name}: ${r.score}${star}</div>`;
                }).join('');
            }
        }

        // 绘制小地图（只显示可移动区域）
        function drawMiniMap() {
            const miniMap = document.getElementById('miniMap');
            if (!miniMap) return;
            const mCtx = miniMap.getContext('2d');
            const mapSize = 100;  // 与CSS宽度一致

            // 可移动范围（排除边界1格）
            const playableSize = WORLD_SIZE - 2;
            const scale = mapSize / playableSize;

            // 清空（透明）
            mCtx.clearRect(0, 0, mapSize, mapSize);

            // 绘制可移动区域背景
            if (gameMode === 'chase') {
                // 大逃杀模式：深色背景
                mCtx.fillStyle = 'rgba(30, 30, 40, 0.9)';
            } else {
                // 其他模式：粉色背景
                mCtx.fillStyle = 'rgba(255, 240, 245, 0.85)';
            }
            mCtx.fillRect(0, 0, mapSize, mapSize);

            // 绘制边界框
            mCtx.strokeStyle = 'rgba(255, 105, 180, 0.6)';
            mCtx.lineWidth = 2;
            mCtx.strokeRect(0, 0, mapSize, mapSize);

            // 绘制食物
            foods.forEach(food => {
                if (food.x >= 1 && food.x <= WORLD_SIZE - 2 && food.y >= 1 && food.y <= WORLD_SIZE - 2) {
                    mCtx.fillStyle = food.color;
                    mCtx.beginPath();
                    mCtx.arc((food.x - 1) * scale, (food.y - 1) * scale, 2, 0, Math.PI * 2);
                    mCtx.fill();
                }
            });

            // 大逃杀模式：绘制AI位置（红点）
            if (gameMode === 'chase') {
                aiSnakes.forEach(ai => {
                    if (!ai.alive) return;
                    const aiHead = ai.body[0];
                    if (aiHead.x >= 1 && aiHead.x <= WORLD_SIZE - 2 && aiHead.y >= 1 && aiHead.y <= WORLD_SIZE - 2) {
                        mCtx.fillStyle = '#ff4757'; // 红色表示AI
                        mCtx.beginPath();
                        mCtx.arc((aiHead.x - 1) * scale, (aiHead.y - 1) * scale, 4, 0, Math.PI * 2);
                        mCtx.fill();
                    }
                });
            }

            // 绘制蛇
            snake.forEach((seg, i) => {
                if (seg.x >= 1 && seg.x <= WORLD_SIZE - 2 && seg.y >= 1 && seg.y <= WORLD_SIZE - 2) {
                    mCtx.fillStyle = i === 0 ? '#ff69b4' : '#ffb6c1';
                    mCtx.beginPath();
                    mCtx.arc((seg.x - 1) * scale, (seg.y - 1) * scale, i === 0 ? 3 : 2, 0, Math.PI * 2);
                    mCtx.fill();
                }
            });
        }

        function update() {
            frameCount++;
            smoothDirection();

            // 更新AI蛇
            if (gameMode === 'battle') {
                updateAISnakes();
                // 每30帧更新一次实时排名（约0.5秒）
                if (frameCount % 30 === 0) {
                    updateBattleRanking();
                }
                // 检测并重新生成死亡的AI蛇（仅大乱斗模式，大逃杀模式不刷新）
                if (gameMode === 'battle' && frameCount % 60 === 0) {
                    respawnAISnake();
                }
            }

            // 大逃杀模式：更新AI
            if (gameMode === 'chase') {
                updateAISnakes();
            }

            // 传送门冷却递减
            if (portalCooldown > 0) portalCooldown--;

            // 计算移动
            const diff = DIFFICULTY[currentDifficulty];
            const speed = isBoosting ? diff.boostSpeed : diff.speed;
            let dx = Math.cos(direction) * speed;
            let dy = Math.sin(direction) * speed;

            // 移动头部位置（无限画布，可以任意移动）
            let headX = snake[0].x + dx;
            let headY = snake[0].y + dy;

            // 传送门检测（经典模式）
            if (gameMode === 'classic' && portals.length > 0 && portalCooldown <= 0) {
                for (let portal of portals) {
                    const dist = Math.sqrt(
                        Math.pow(portal.x - headX, 2) +
                        Math.pow(portal.y - headY, 2)
                    );
                    if (dist < 2.5) {  // 增大检测范围
                        // 穿过传送门
                        headX = portal.targetX;
                        headY = portal.targetY;
                        portalCooldown = 30; // 传送后30帧内不再传送
                        // 播放传送音效
                        playTeleportSound();
                        // 传送特效
                        createParticles(portal.x, portal.y, portal.color);
                        createParticles(portal.targetX, portal.targetY, portal.color);
                        break;
                    }
                }
            }

            // 边界碰撞检测（碰到边界游戏结束）
            if (headX <= 0 || headX >= WORLD_SIZE - 1 || headY <= 0 || headY >= WORLD_SIZE - 1) {
                isBoundaryDeath = true;
                playGameOverSound();
                gameOver();
                return;
            }

            // 转换为网格坐标进行碰撞检测
            const gridX = Math.floor(headX + 0.5);
            const gridY = Math.floor(headY + 0.5);

            // 自身碰撞检测（无敌时跳过，只有长度超过8节才检测，检测距离更宽松）
            // 大乱斗和chase模式允许自撞，不判定失败
            if (!isInvincible && snake.length > 8 && gameMode !== 'battle' && gameMode !== 'chase') {
                let collided = false;
                for (let i = 8; i < snake.length - 1; i++) {
                    const dist = Math.sqrt(
                        Math.pow(snake[i].x - headX, 2) +
                        Math.pow(snake[i].y - headY, 2)
                    );
                    // 只有距离非常近才判定碰撞
                    if (dist < 1) {
                        collided = true;
                        break;
                    }
                }
                if (collided) {
                    playGameOverSound();
                    gameOver();
                    return;
                }
            }

            // 大乱斗/大追杀模式：检测玩家撞到AI蛇
            if (gameMode === 'battle' || gameMode === 'chase') {
                for (let ai of aiSnakes) {
                    if (!ai.alive) continue;

                    // 头对头碰撞：玩家头部撞到AI头部
                    // 无敌时间内不判定失败
                    if (!isInvincible) {
                        const aiHead = ai.body[0];
                        if (Math.abs(headX - aiHead.x) < 1 && Math.abs(headY - aiHead.y) < 1) {
                            // 头对头碰撞 - 双方同时失败
                            killAISnake(ai, '你');
                            playGameOverSound();
                            killPlayer('头对头碰撞平局!');
                            return;
                        }
                    }

                    // 头对身体碰撞：玩家头部撞到AI身体
                    for (let j = 1; j < ai.body.length; j++) {
                        const dist = Math.sqrt(Math.pow(headX - ai.body[j].x, 2) + Math.pow(headY - ai.body[j].y, 2));
                        if (dist < 1) {
                            // 玩家头部撞到AI身体，AI被击杀
                            killAISnake(ai, '你');
                            killCount++; // 大追杀模式增加击杀数
                            // 更新UI
                            if (gameMode === 'chase') {
                                document.getElementById('killCount').textContent = killCount;
                            }
                            playComboSound(2);
                            return;
                        }
                    }
                }
            }

            // 磁吸吃食物检测
            const magnetRange = 3.5; // 磁吸范围（网格）
            const eatRange = 1.2;   // 吃食物距离（增大）
            const magnetSpeed = 0.2; // 磁吸移动速度

            let ateFood = false;
            let foodValue = 0;
            for (let i = foods.length - 1; i >= 0; i--) {
                const food = foods[i];
                const foodCenterX = food.x + 0.5;
                const foodCenterY = food.y + 0.5;
                const dist = Math.sqrt(
                    Math.pow(foodCenterX - headX, 2) +
                    Math.pow(foodCenterY - headY, 2)
                );

                if (dist < eatRange) {
                    // 吃到食物
                    foodValue = food.value;
                    const points = food.value * 10;

                    // 连击系统：2秒内连续吃食物增加连击
                    const now = Date.now();
                    if (now - lastEatTime < 2000) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    // 更新最高连击记录
                    if (combo > maxCombo) {
                        maxCombo = combo;
                    }
                    lastEatTime = now;

                    // 连击加分 = 基础分 * 连击倍数
                    const comboMultiplier = Math.min(combo, 10); // 最高10倍
                    const comboBonus = points * (comboMultiplier - 1);

                    // 加速加分
                    const boostBonus = isBoosting ? food.value * 5 : 0;

                    // 累加分数
                    score += points + comboBonus + boostBonus;

                    // 分开显示分数（用网格偏移）
                    // 1. 显示基础分（始终显示）
                    createScorePopup(foodCenterX, foodCenterY, points, food.color);

                    // 2. 连击加成显示（combo >= 2 且有加成时）
                    if (combo >= 2 && comboBonus > 0) {
                        createScorePopup(foodCenterX + 0.8, foodCenterY - 0.5, comboBonus, '#ffa502');
                    }

                    // 3. 加速加成显示（有加成时）
                    if (isBoosting && boostBonus > 0) {
                        createScorePopup(foodCenterX - 0.8, foodCenterY - 0.5, boostBonus, '#ff4757');
                    }

                    // 显示连击数
                    if (combo > 1) {
                        // 播放连击音效（包含连杀文字显示）
                        playComboSound(combo);
                    }

                    createParticles(foodCenterX, foodCenterY, food.color);
                    playEatSound();
                    foods.splice(i, 1);
                    ateFood = true;
                } else if (dist < magnetRange) {
                    // 磁吸效果：食物向蛇头移动
                    const angle = Math.atan2(headY - foodCenterY, headX - foodCenterX);
                    food.x += Math.cos(angle) * magnetSpeed;
                    food.y += Math.sin(angle) * magnetSpeed;
                }
            }

            // 更新蛇的位置
            snake.unshift({ x: headX, y: headY });

            if (!ateFood) {
                snake.pop();
            } else {
                // 根据食物分值决定增长长度
                const growAmount = foodValue > 0 ? foodValue : 1;
                for (let g = 0; g < growAmount; g++) {
                    const tail = snake[snake.length - 1];
                    snake.push({ x: tail.x, y: tail.y });
                }
            }

            // 补充食物（大逃杀模式不需要自动生成食物）
            if (gameMode !== 'chase' && foods.length < 60) {
                spawnFood(5);
            }

            updateParticles();
            updateScorePopups();

            // 更新UI
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;

            draw();
        }

        function startGame() {
            frameCount = 0;
            updateGridCount();

            // 全屏模式
            launchFullscreen();

            // 初始化音频（开始背景音乐）
            initAudio();

            // 重置连击记录
            maxCombo = 0;

            // 隐藏作者信息和控制提示，显示生命
            document.getElementById('authorInfo').style.display = 'none';
            document.getElementById('controlHint').style.display = 'none';

            // 根据模式显示/隐藏元素
            if (gameMode === 'classic') {
                document.getElementById('lifeDisplay').style.display = 'block';
                // 初始化传送门
                initPortals();
            } else if (gameMode === 'battle' || gameMode === 'chase') {
                // 大乱斗/大追杀模式
                document.getElementById('lifeDisplay').style.display = 'none';
                portals = [];
            } else {
                // 限时挑战模式
                document.getElementById('lifeDisplay').style.display = 'none';
                portals = [];
            }

            // 重置生命（限时模式固定1条命）
            currentLives = gameMode === 'timed' ? 1 : maxLives;
            isGameOver = false;
            document.getElementById('lives').textContent = currentLives;

            // 重置连击
            combo = 0;
            document.getElementById('comboDisplay').style.display = 'none';

            // 大追杀模式：重置击杀数
            if (gameMode === 'chase') {
                killCount = 0;
            }

            score = 0;
            foods = [];
            particles = [];
            isBoosting = false;
            currentSpeed = baseSpeed;
            portalCooldown = 0; // 重置传送冷却

            document.getElementById('score').textContent = '0';
            document.getElementById('length').textContent = '3';
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameOver').classList.remove('show');

            initSnake();

            // 大乱斗/大追杀模式：初始化AI蛇
            if (gameMode === 'battle' || gameMode === 'chase') {
                initAISnakes();
            }

            // 大乱斗模式有随机食物，大追杀模式没有初始食物
            if (gameMode === 'battle') {
                spawnFood(50);
            }

            // 大逃杀模式：显示击杀数
            if (gameMode === 'chase') {
                document.getElementById('killDisplay').style.display = 'block';
                document.getElementById('killCount').textContent = '0';
                document.getElementById('totalAI').textContent = CHASE_AI_COUNT;
            } else {
                document.getElementById('killDisplay').style.display = 'none';
            }

            // 游戏开始时设置初始无敌时间
            isInvincible = true;
            setTimeout(() => { isInvincible = false; }, 2000);

            draw();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, currentSpeed);
            isRunning = true;

            // 限时挑战：启动倒计时
            if (gameMode === 'timed' || gameMode === 'battle' || gameMode === 'chase') {
                document.getElementById('timerDisplay').style.display = 'block';
                if (gameMode === 'chase') {
                    timeRemaining = chaseTimeLimit;
                } else {
                    timeRemaining = gameMode === 'battle' ? battleTimeLimit : timeLimit;
                }
                document.getElementById('timer').textContent = timeRemaining;
                document.getElementById('timerItem').classList.remove('warning');

                // 大乱斗模式：显示实时排名
                if (gameMode === 'battle') {
                    document.getElementById('rankingDisplay').style.display = 'block';
                    updateBattleRanking();
                }

                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    document.getElementById('timer').textContent = timeRemaining;

                    // 最后10秒警告
                    if (timeRemaining <= 10) {
                        document.getElementById('timerItem').classList.add('warning');
                    }

                    // 时间到
                    if (timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        if (gameMode === 'battle') {
                            battleModeGameOver();
                        } else if (gameMode === 'chase') {
                            chaseModeGameOver();
                        } else {
                            timedModeGameOver();
                        }
                    }
                }, 1000);
            } else {
                document.getElementById('timerDisplay').style.display = 'none';
            }
        }

        // 大乱斗模式结束
        function battleModeGameOver() {
            clearInterval(gameLoop);
            isRunning = false;
            stopBackgroundMusic();
            isGameOver = true;

            // 隐藏实时排名
            document.getElementById('rankingDisplay').style.display = 'none';

            // 计算排名
            battleRanking = [
                { name: '你', score: score, length: snake.length, isPlayer: true },
                ...aiSnakes.filter(ai => ai.alive).map(ai => ({ name: ai.name, score: ai.score, length: ai.body.length, isPlayer: false }))
            ];
            battleRanking.sort((a, b) => b.score - a.score);

            // 显示排名
            let rankingText = battleRanking.map((r, i) => (i + 1) + '. ' + r.name + ': ' + r.score + '分').join('<br>');

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('finalMaxCombo').textContent = maxCombo + '连击';
            document.getElementById('gameOver').classList.add('show');

            const gameOverTitle = document.querySelector('#gameOver h2');
            if (gameOverTitle) {
                const playerRank = battleRanking.findIndex(r => r.isPlayer) + 1;
                gameOverTitle.innerHTML = '大乱斗结束!<br><span style="font-size:16px">排名: 第' + playerRank + '名</span><br><span style="font-size:12px">' + rankingText + '</span>';
            }
        }

        // 限时挑战结束
        function timedModeGameOver() {
            clearInterval(gameLoop);
            isRunning = false;
            stopBackgroundMusic();
            isGameOver = true;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('finalMaxCombo').textContent = maxCombo + '连击';
            document.getElementById('gameOver').classList.add('show');

            // 修改结束提示
            const gameOverTitle = document.querySelector('#gameOver h2');
            if (gameOverTitle) {
                gameOverTitle.textContent = '游戏结束! 🎮';
            }
        }

        // 大追杀模式结束
        function chaseModeGameOver() {
            clearInterval(gameLoop);
            isRunning = false;
            stopBackgroundMusic();
            isGameOver = true;

            // 隐藏实时排名
            document.getElementById('rankingDisplay').style.display = 'none';

            // 计算存活AI数量
            const aliveCount = aiSnakes.filter(ai => ai.alive).length;

            // 更新最高击杀记录
            if (killCount > maxKillCount) {
                maxKillCount = killCount;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('finalMaxCombo').textContent = '击杀: ' + killCount + '条';
            document.getElementById('gameOver').classList.add('show');

            // 修改结束提示
            const gameOverTitle = document.querySelector('#gameOver h2');
            if (gameOverTitle) {
                let resultText = '';
                if (killCount >= 10) {
                    resultText = '🏆 超神表现! ';
                } else if (killCount >= 6) {
                    resultText = '⭐ 表现出色! ';
                } else if (killCount >= 3) {
                    resultText = '💪 不错哦! ';
                } else {
                    resultText = '💕 再接再厉! ';
                }
                gameOverTitle.innerHTML = resultText + '<br><span style="font-size:16px">击杀: ' + killCount + '条 | 存活: ' + aliveCount + '条</span><br><span style="font-size:12px; color:#ffb6c1;">最高纪录: ' + maxKillCount + '条</span>';
            }
        }

        function gameOver() {
            clearInterval(gameLoop);
            isRunning = false;

            // 限时挑战模式
            if (gameMode === 'timed') {
                // 时间到了 或 时间没到但失败了，都显示游戏结束
                stopBackgroundMusic();
                isGameOver = true;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalLength').textContent = snake.length;
                document.getElementById('finalMaxCombo').textContent = maxCombo + '连击';
                document.getElementById('gameOver').classList.add('show');
                // 修改结束提示
                const gameOverTitle = document.querySelector('#gameOver h2');
                if (gameOverTitle) {
                    gameOverTitle.textContent = '游戏结束! 🎮';
                }
                return;
            }

            // 大乱斗模式
            if (gameMode === 'battle') {
                // 玩家死亡，AI胜利
                stopBackgroundMusic();
                isGameOver = true;

                // 计算排名
                battleRanking = [
                    { name: '你', score: score, length: snake.length, isPlayer: true },
                    ...aiSnakes.filter(ai => ai.alive).map(ai => ({ name: ai.name, score: ai.score, length: ai.body.length, isPlayer: false }))
                ];
                battleRanking.sort((a, b) => b.score - a.score);

                const playerRank = battleRanking.findIndex(r => r.isPlayer) + 1;
                let rankingText = battleRanking.map((r, i) => (i + 1) + '. ' + r.name + ': ' + r.score + '分').join('<br>');

                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalLength').textContent = snake.length;
                document.getElementById('finalMaxCombo').textContent = maxCombo + '连击';
                document.getElementById('gameOver').classList.add('show');

                const gameOverTitle = document.querySelector('#gameOver h2');
                if (gameOverTitle) {
                    gameOverTitle.innerHTML = '你被淘汰了!<br><span style="font-size:16px">排名: 第' + playerRank + '名</span><br><span style="font-size:12px">' + rankingText + '</span>';
                }
                return;
            }

            // 大追杀模式
            if (gameMode === 'chase') {
                // 玩家死亡，提前结束
                stopBackgroundMusic();
                isGameOver = true;

                // 计算存活AI数量
                const aliveCount = aiSnakes.filter(ai => ai.alive).length;

                // 更新最高击杀记录
                if (killCount > maxKillCount) {
                    maxKillCount = killCount;
                }

                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalLength').textContent = snake.length;
                document.getElementById('finalMaxCombo').textContent = '击杀: ' + killCount + '条';
                document.getElementById('gameOver').classList.add('show');

                const gameOverTitle = document.querySelector('#gameOver h2');
                if (gameOverTitle) {
                    gameOverTitle.innerHTML = '游戏结束!<br><span style="font-size:16px">击杀: ' + killCount + '条 | 存活: ' + aliveCount + '条</span><br><span style="font-size:12px; color:#ffb6c1;">最高纪录: ' + maxKillCount + '条</span>';
                }
                return;
            }

            // 经典模式 - 减少生命
            currentLives--;
            document.getElementById('lives').textContent = currentLives;

            if (currentLives > 0) {
                // 还有生命，显示失败提示后继续（不停止音乐）
                showFailHint();
                return; // 重要：立即返回，不继续执行后面的代码
            } else {
                // 生命用完，真正结束（停止音乐）
                stopBackgroundMusic();
                isGameOver = true;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalLength').textContent = snake.length;
                document.getElementById('finalMaxCombo').textContent = maxCombo + '连击';
                document.getElementById('gameOver').classList.add('show');
            }
        }

        // 保存碰撞前的游戏状态
        let savedSnakeState = null;
        let isInvincible = false; // 无敌状态
        let isBoundaryDeath = false; // 是否边界死亡

        function showFailHint() {
            // 保存当前蛇的状态和分数
            savedSnakeState = {
                snake: JSON.parse(JSON.stringify(snake)),
                score: score,
                direction: direction,
                targetDirection: targetDirection
            };

            const failHint = document.getElementById('failHint');
            failHint.innerHTML = `💕 还好还好~ 剩余生命: <span>${currentLives}</span><br><small>3秒后继续加油!</small>`;
            failHint.classList.add('show');

            // 3秒后继续游戏
            setTimeout(() => {
                failHint.classList.remove('show');

                if (savedSnakeState) {
                    // 边界死亡：重置到中心但保持长度；普通碰撞：恢复状态
                    if (isBoundaryDeath) {
                        // 计算蛇头新位置（中心）
                        const centerX = WORLD_SIZE / 2;
                        const centerY = WORLD_SIZE / 2;
                        const oldLength = savedSnakeState.snake.length;

                        // 重置蛇到中心，保持原有长度，非常紧凑
                        snake = [];
                        for (let i = 0; i < oldLength; i++) {
                            snake.push({
                                x: centerX - i * 0.5,
                                y: centerY
                            });
                        }
                        direction = 0;
                        targetDirection = 0;
                        camera.x = snake[0].x * GRID_SIZE - canvas.width / 2;
                        camera.y = snake[0].y * GRID_SIZE - canvas.height / 2;
                        score = savedSnakeState.score;
                        isBoundaryDeath = false;
                    } else {
                        // 普通碰撞恢复
                        snake = savedSnakeState.snake;
                        score = savedSnakeState.score;
                        direction = savedSnakeState.direction;
                        targetDirection = savedSnakeState.targetDirection;
                    }
                    savedSnakeState = null;

                    // 激活无敌状态
                    isInvincible = true;
                    setTimeout(() => { isInvincible = false; }, 2000);
                }

                // 更新UI
                document.getElementById('score').textContent = score;
                document.getElementById('length').textContent = snake.length;

                // 重新开始游戏循环和背景音乐
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = setInterval(update, currentSpeed);
                isRunning = true;
                bgMusicStarted = false;
                startBackgroundMusic();
                draw();
            }, 3000);
        }

        function restart() {
            document.getElementById('gameOver').classList.remove('show');

            if (isGameOver) {
                // 真正结束后的重启，重置所有
                startGame();
            } else {
                // 生命还有，继续游戏
                initSnake();
                foods = [];
                particles = [];
                if (gameMode !== 'chase') {
                    spawnFood(30);
                }

                if (gameLoop) clearInterval(gameLoop);
                gameLoop = setInterval(update, currentSpeed);
                isRunning = true;

                // 重新播放背景音乐
                initAudio();

                draw();
            }
        }

        // 设置生命次数
        function setLife(life) {
            maxLives = life;
            // 使用ID找到生命选择器并移除active
            const lifeSelect = document.getElementById('lifeSelectArea');
            if (lifeSelect) {
                lifeSelect.querySelectorAll('.life-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
            event.target.classList.add('active');
        }

        function backToMenu() {
            if (isRunning) {
                clearInterval(gameLoop);
                isRunning = false;
            }
            // 清除倒计时
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            // 隐藏倒计时和连击显示
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('comboDisplay').style.display = 'none';
            document.getElementById('killDisplay').style.display = 'none';

            stopBackgroundMusic();
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('mainMenu').classList.remove('hidden');
            // 显示作者信息，隐藏生命和失败提示
            document.getElementById('authorInfo').style.display = 'block';
            document.getElementById('lifeDisplay').style.display = 'none';
            document.getElementById('failHint').classList.remove('show');

            // 恢复游戏结束标题
            const gameOverTitle = document.querySelector('#gameOver h2');
            if (gameOverTitle) {
                gameOverTitle.textContent = '哎呀~ 再接再厉! 💕';
            }
        }

        // 全屏函数
        function launchFullscreen() {
            // 尝试多种全屏方式
            const tryFullscreen = (elem) => {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(() => {});
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen().catch(() => {});
                } else if (elem.mozRequestFullScreen) {
                    elem.mozRequestFullScreen().catch(() => {});
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen().catch(() => {});
                }
            };

            // 先尝试 canvas 全屏
            tryFullscreen(document.getElementById('gameCanvas'));
            // 再尝试整个页面
            setTimeout(() => tryFullscreen(document.documentElement), 100);
        }

        // 初始化
        initJoystick();
        initBoostButton();
        initSwipeControl();

        // 初始绘制
        updateGridCount();
        draw();
    </script>
</body>
</html>
