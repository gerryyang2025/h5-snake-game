<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>贪吃蛇大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* 菜单允许滚动 */
        .menu {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 虚拟摇杆 */
        .joystick-area {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 50;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            background: rgba(100, 100, 100, 0.2);
            border: 2px solid rgba(100, 100, 100, 0.4);
            border-radius: 50%;
            position: relative;
        }

        .joystick-knob {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #888, #666);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.05s ease-out;
        }

        .joystick-knob.active {
            background: linear-gradient(135deg, #aaa, #888);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        }

        /* 加速按钮 */
        .boost-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(100, 100, 100, 0.5), rgba(80, 80, 80, 0.3));
            border: 3px solid rgba(100, 100, 100, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #888;
            font-weight: bold;
            z-index: 50;
            user-select: none;
            -webkit-user-select: none;
        }

        .boost-btn.active {
            background: rgba(255, 71, 87, 0.6);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.8);
        }

        .boost-btn .boost-icon {
            font-size: 24px;
            display: block;
            line-height: 1;
            color: #888;
        }

        .boost-btn span:last-child {
            font-size: 12px;
            margin-top: 2px;
        }

        /* 分数显示 */
        .score-display {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            pointer-events: none;
        }

        .score-item {
            background: rgba(255, 105, 180, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .score-item span {
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            margin-left: 5px;
        }

        /* 菜单 */
        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #4a4a5e 0%, #3d3d4f 50%, #2d2d3d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 100;
            padding: 20px;
            padding-bottom: 60px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }

        .menu.hidden { display: none; }

        .menu h1 {
            font-size: 32px;
            color: #ff69b4;
            margin-bottom: 5px;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .menu h2 {
            font-size: 14px;
            color: #ffb6c1;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .menu-btn {
            background: linear-gradient(135deg, #7986cb, #5c6bc0);
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 25px;
            margin: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(92, 107, 192, 0.4);
        }

        .menu-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(92, 107, 192, 0.3);
        }

        .tips {
            margin-top: 15px;
            color: #ffb6c1;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            max-width: 90%;
        }

        .tips b {
            color: #ff69b4;
        }

        /* 生命次数选择 */
        .life-select {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .life-select label {
            color: #ffb6c1;
            font-size: 12px;
            margin-right: 3px;
        }

        .life-btn {
            background: rgba(60, 60, 80, 0.6);
            border: 2px solid #ff69b4;
            color: #ffb6c1;
            min-width: 40px;
            height: 32px;
            padding: 0 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: bold;
        }

        .life-btn:hover {
            background: rgba(255, 105, 180, 0.3);
        }

        .life-btn.active {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
        }

        /* 生命显示 */
        .life-display {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            pointer-events: none;
        }

        .life-item {
            background: rgba(255,105,180,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .life-item span {
            color: #ff1493;
            font-weight: bold;
            font-size: 18px;
            margin-left: 5px;
        }

        /* 失败提示 */
        .fail-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 182, 193, 0.95);
            color: #8b4513;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            z-index: 60;
            display: none;
            animation: failPulse 0.5s ease-out;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,182,193,0.5);
        }

        .fail-hint.show {
            display: block;
        }

        @keyframes failPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* 游戏结束 */
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: rgba(255, 240, 245, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.4);
            border: 2px solid rgba(255, 105, 180, 0.3);
        }

        .game-over.show { display: flex; }

        .game-over h2 {
            font-size: 28px;
            color: #ff69b4;
            margin-bottom: 20px;
        }

        .game-over .score-summary {
            font-size: 18px;
            color: #888;
            margin-bottom: 12px;
        }

        .game-over .score-summary span {
            color: #ff69b4;
            font-weight: bold;
            font-size: 22px;
        }
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .game-over .score-summary span {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        /* 操作提示 */
        .control-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            z-index: 40;
            pointer-events: none;
            opacity: 0.8;
        }

        /* 作者信息 */
        .author-info {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            padding-bottom: 10px;
        }

        .author-info span {
            color: #ff69b4;
            font-weight: bold;
        }

        /* 模式选择 */
        .mode-select {
            display: flex;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }

        .mode-btn {
            background: rgba(60, 60, 80, 0.6);
            border: 2px solid #ff69b4;
            color: #ffb6c1;
            padding: 15px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 130px;
            flex: 1 1 calc(50% - 12px);
            max-width: 180px;
            text-align: center;
            box-sizing: border-box;
        }

        .mode-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.3);
        }

        .mode-btn.selected {
            border-color: #ff69b4;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
            background: rgba(255, 105, 180, 0.3);
            color: #fff;
        }

        .mode-btn .mode-icon {
            font-size: 26px;
            display: block;
            margin-bottom: 5px;
        }

        .mode-btn .mode-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .mode-btn .mode-desc {
            font-size: 11px;
            color: #ffb6c1;
            line-height: 1.3;
        }

        /* 连击显示 */
        .combo-display {
            position: fixed;
            top: 75px;
            right: 20px;
            z-index: 50;
            pointer-events: none;
            display: none;
            text-align: right;
        }

        .combo-item {
            background: linear-gradient(135deg, #ff4757, #ffa502, #ff6348);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            animation: comboPop 0.3s ease-out, comboGlow 0.5s ease-in-out infinite alternate;
            display: inline-block;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.6), 0 0 40px rgba(255, 165, 2, 0.3);
            border: 2px solid #fff;
        }

        .combo-item span {
            color: #fff;
            font-size: 28px;
            margin-left: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        @keyframes comboPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes comboGlow {
            0% { box-shadow: 0 0 20px rgba(255, 71, 87, 0.6), 0 0 40px rgba(255, 165, 2, 0.3); }
            100% { box-shadow: 0 0 30px rgba(255, 71, 87, 0.9), 0 0 60px rgba(255, 165, 2, 0.5); }
        }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 倒计时显示 */
        .timer-display {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            pointer-events: none;
            display: none;
        }

        .timer-item {
            display: inline-block;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(255, 71, 87, 0.6);
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .timer-item span {
            color: #fff;
            font-size: 32px;
        }

        .timer-item.warning {
            animation: timerPulse 0.5s infinite;
        }

        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 大乱斗实时排名 */
        .ranking-display {
            position: fixed;
            top: 95px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff69b4;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
            min-width: 120px;
            max-height: 200px;
            overflow-y: auto;
        }

        .ranking-title {
            font-size: 12px;
            color: #ff69b4;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }

        .ranking-list {
            font-size: 11px;
            color: #fff;
            line-height: 1.6;
        }

        .ranking-list .player {
            color: #2ecc71;
            font-weight: bold;
        }

        /* 传送门 */
        .portal {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
        }

        .portal-1 {
            top: 100px;
            right: 20px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.8);
        }

        .portal-2 {
            bottom: 100px;
            left: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            box-shadow: 0 0 30px rgba(240, 147, 251, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- 分数显示 -->
    <div class="score-display">
        <div class="score-item">得分<span id="score">0</span></div>
        <div class="score-item">长度<span id="length">3</span></div>
    </div>

    <!-- 大逃杀击杀显示 -->
    <div class="kill-display" id="killDisplay" style="display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 50;">
        <div class="kill-item" style="background: linear-gradient(135deg, #ff4757, #ffa502); padding: 10px 25px; border-radius: 25px; font-size: 18px; font-weight: bold; color: #fff; box-shadow: 0 0 20px rgba(255,71,87,0.6);">
            🔪 击杀: <span id="killCount" style="font-size: 24px; margin-left: 5px;">0</span> / <span id="totalAI">16</span>
        </div>
    </div>

    <!-- 连击显示 -->
    <div class="combo-display" id="comboDisplay">
        <div class="combo-item">连击<span id="combo">0</span></div>
    </div>

    <!-- 倒计时显示 -->
    <div class="timer-display" id="timerDisplay">
        <div class="timer-item" id="timerItem">⏰ <span id="timer">90</span></div>
    </div>

    <!-- 大乱斗实时排名 -->
    <div class="ranking-display" id="rankingDisplay" style="display: none;">
        <div class="ranking-title">📊 实时排名</div>
        <div class="ranking-list" id="rankingList"></div>
    </div>

    <!-- 生命显示 -->
    <div class="life-display" id="lifeDisplay" style="display: none;">
        <div class="life-item">生命<span id="lives">3</span></div>
    </div>

    <!-- 小地图 -->
    <canvas id="miniMap" width="100" height="100" style="position: fixed; bottom: 20px; right: 130px; width: 100px; height: 100px; background: transparent; border: 2px solid rgba(255,105,180,0.5); border-radius: 8px;"></canvas>

    <!-- 失败提示 -->
    <div class="fail-hint" id="failHint"></div>

    <!-- 虚拟摇杆 -->
    <div class="joystick-area" id="joystickArea">
        <div class="joystick-base">
            <div class="joystick-knob" id="joystickKnob"></div>
        </div>
    </div>

    <!-- 加速按钮 -->
    <div class="boost-btn" id="boostBtn">
        🚀
    </div>

    <!-- 操作提示 -->
    <div class="control-hint" id="controlHint">拖动摇杆或滑动屏幕控制方向</div>



    <!-- 主菜单 -->
    <div class="menu" id="mainMenu">
        <img src="asserts/images/cute_snake.jpg" style="width: 120px; height: 120px; border-radius: 50%; box-shadow: 0 0 25px rgba(92, 107, 192, 0.4); margin: 10px;">
        <h1 style="margin-top: 5px; font-size: 28px; text-shadow: 0 2px 10px rgba(255,105,180,0.5);">贪吃蛇大作战</h1>
        <h2 style="font-size: 14px; opacity: 0.8; margin-bottom: 15px;">360° 自由方向 · 陀螺仪/摇杆/滑动</h2>

        <!-- 模式选择 -->
        <div class="mode-select">
            <div class="mode-btn selected" id="modeClassic" onclick="selectMode('classic')">
                <span class="mode-icon">🎮</span>
                <div class="mode-name">经典模式</div>
                <div class="mode-desc">无限时间，吃到饱！</div>
            </div>
            <div class="mode-btn" id="modeTimed" onclick="selectMode('timed')">
                <span class="mode-icon">⏱️</span>
                <div class="mode-name">限时挑战</div>
                <div class="mode-desc">90秒尽可能拿高分</div>
            </div>
            <div class="mode-btn" id="modeBattle" onclick="selectMode('battle')">
                <span class="mode-icon">⚔️</span>
                <div class="mode-name">大乱斗</div>
                <div class="mode-desc">3分钟多人混战！</div>
            </div>
            <div class="mode-btn" id="modeChase" onclick="selectMode('chase')">
                <span class="mode-icon">🔪</span>
                <div class="mode-name">大逃杀·猎手</div>
                <div class="mode-desc">1分钟猎杀16条AI！</div>
            </div>
        </div>

        <!-- 大逃杀模式AI难度选择 -->
        <div class="life-select" id="chaseDifficultySelect" style="display: none;">
            <label>AI智商:</label>
            <button class="life-btn active" id="chaseEasy" onclick="setChaseDifficulty('easy')">简单</button>
            <button class="life-btn" id="chaseNormal" onclick="setChaseDifficulty('normal')">普通</button>
            <button class="life-btn" id="chaseHard" onclick="setChaseDifficulty('hard')">困难</button>
        </div>

        <!-- 生命次数选择 -->
        <div class="life-select" id="lifeSelectArea">
            <label>生命次数:</label>
            <button class="life-btn" id="life1" onclick="setLife(1)">1</button>
            <button class="life-btn active" id="life3" onclick="setLife(3)">3</button>
            <button class="life-btn" id="life5" onclick="setLife(5)">5</button>
        </div>

        <!-- 难度选择 -->
        <div class="life-select" id="difficultySelect">
            <label>难度:</label>
            <button class="life-btn" id="diffEasy" onclick="setDifficulty('easy')">简单</button>
            <button class="life-btn active" id="diffNormal" onclick="setDifficulty('normal')">普通</button>
            <button class="life-btn" id="diffHard" onclick="setDifficulty('hard')">困难</button>
            <button class="life-btn" id="diffExpert" onclick="setDifficulty('expert')">专家</button>
        </div>

        <button class="menu-btn" onclick="initAudio(); startGame()">开始游戏</button>

        <button class="menu-btn" onclick="window.open('help.html','_blank')" style="background: transparent; border: 2px solid #ff69b4; color: #ff69b4;">📖 玩法说明</button>

        <!-- 作者信息 -->
        <div class="author-info" id="authorInfo">🎮 作者: <span>Gerry</span> | 📌 版本: <span>v4.5</span></div>
    </div>

    <!-- 游戏结束 -->
    <div class="game-over" id="gameOver">
        <h2>哎呀~ 再接再厉! 💕</h2>
        <p class="score-summary">本次得分: <span id="finalScore">0</span></p>
        <p class="score-summary">蛇身长度: <span id="finalLength">0</span></p>
        <p class="score-summary">最高连击: <span id="finalMaxCombo">0</span></p>
        <button class="menu-btn" onclick="restart()">再来一局</button>
        <button class="menu-btn" onclick="backToMenu()" style="background: transparent; border: 2px solid #ff69b4; color: #ff69b4;">返回菜单</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 初始化画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏配置
        const GRID_SIZE = 20;
        let GRID_COUNT_X, GRID_COUNT_Y;

        function updateGridCount() {
            GRID_COUNT_X = Math.floor(canvas.width / GRID_SIZE);
            GRID_COUNT_Y = Math.floor(canvas.height / GRID_SIZE);
        }
        updateGridCount();

        // 蛇和食物
        let snake = [];
        let foods = [];
        let particles = [];
        let scorePopups = []; // 分数弹出文字

        // 方向控制 - 使用弧度（360度方向）
        let direction = 0; // 弧度，0向右
        let targetDirection = 0;
        let isBoosting = false;
        let baseSpeed = 80;
        let currentSpeed = baseSpeed;

        let score = 0;
        let gameLoop = null;
        let isRunning = false;
        let frameCount = 0; // 帧计数器

        // 游戏模式
        let gameMode = 'classic'; // 'classic' 经典模式, 'timed' 限时挑战, 'battle' 大乱斗, 'chase' 大追杀
        let timeLimit = 90; // 限时模式时间（秒）
        let timeRemaining = 90;
        let timerInterval = null;

        // 大追杀模式

        // ============ 虚拟摇杆控制 ============
        function initJoystick() {
            const rect = joystickArea.getBoundingClientRect();
            joystickCenter = {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };

            // 触摸事件
            joystickArea.addEventListener('touchstart', handleJoystickStart, { passive: false });
            joystickArea.addEventListener('touchmove', handleJoystickMove, { passive: false });
            joystickArea.addEventListener('touchend', handleJoystickEnd, { passive: false });

            // 鼠标事件（电脑端）
            joystickArea.addEventListener('mousedown', handleJoystickStart);
            document.addEventListener('mousemove', handleJoystickMove);
            document.addEventListener('mouseup', handleJoystickEnd);
        }

        function handleJoystickStart(e) {
            e.preventDefault();
            joystickActive = true;
            joystickKnob.classList.add('active');
            const rect = joystickArea.getBoundingClientRect();
            joystickCenter = {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };

            if (e.touches) {
                updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
            } else {
                updateJoystick(e.clientX, e.clientY);
            }
        }

        function handleJoystickMove(e) {
            if (!joystickActive) return;
            e.preventDefault();

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            updateJoystick(clientX, clientY);
        }

        function handleJoystickEnd(e) {
            joystickActive = false;
            joystickKnob.classList.remove('active');
            // 复位摇杆
            joystickKnob.style.transform = 'translate(-50%, -50%)';
        }

        function updateJoystick(clientX, clientY) {
            const maxRadius = 35;
            let dx = clientX - joystickCenter.x;
            let dy = clientY - joystickCenter.y;

            // 限制在圆形范围内
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            // 更新摇杆视觉位置
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            // 设置方向（使用角度）
            if (distance > 10) {
                targetDirection = Math.atan2(dy, dx);
            }
        }

        // ============ 屏幕滑动控制 ============
        function initSwipeControl() {
            canvas.addEventListener('touchstart', (e) => {
                // 忽略摇杆区域的触摸
                if (e.target.closest('.joystick-area') || e.target.closest('.boost-btn')) return;

                const touch = e.touches[0];

                if (!touchStartPos || e.target.closest('.joystick-area') || e.target.closest('.boost-btn')) return;
                e.preventDefault();

                const touch = e.touches[0];
                const dx = touch.clientX - touchStartPos.x;
                const dy = touch.clientY - touchStartPos.y;

                // 最小滑动距离
                if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    targetDirection = Math.atan2(dy, dx);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                touchStartPos = null;
            });

            // 鼠标滑动支持
            canvas.addEventListener('mousedown', (e) => {
                if (e.target.closest('.joystick-area') || e.target.closest('.boost-btn')) return;

            canvas.addEventListener('mousemove', (e) => {
                if (!touchStartPos) return;

                const dx = e.clientX - touchStartPos.x;
                const dy = e.clientY - touchStartPos.y;

                if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    targetDirection = Math.atan2(dy, dx);
                }
            });

            canvas.addEventListener('mouseup', () => {
                touchStartPos = null;
            });
        }

                const now = Date.now();
                if (now - lastGyroTime < 100) return;
                lastGyroTime = now;

                // 倾斜阈值
                const threshold = 15;
                if (Math.abs(e.gamma) > threshold || Math.abs(e.beta - 45) > threshold) {
                    // gamma: 左右倾斜 (-90 ~ 90)
                    // beta: 前后倾斜 (-180 ~ 180)
                    targetDirection = Math.atan2(e.beta - 45, e.gamma);
                }
            });

        // 初始化AI蛇（大乱斗/大追杀模式）
        function initAISnakes() {
            aiSnakes = [];
            if (gameMode !== 'battle' && gameMode !== 'chase') return;

            const aiCount = gameMode === 'chase' ? CHASE_AI_COUNT : AI_SNAKE_COUNT;
            const aiNames = gameMode === 'chase' ?
                ['小青', '小红', '小白', '小黄', '小紫', '小橙', '小粉', '小灰', '小黑', '小蓝', '小棕', '小银', '小金', '小白2', '小红2', '小绿'] :
                ['小青', '小红', '小白', '小黄', '小紫', '小橙', '小粉', '小灰'];
            const aiColors = gameMode === 'chase' ?
                ['#2ecc71', '#e74c3c', '#ecf0f1', '#f1c40f', '#9b59b6', '#e67e22', '#ff69b4', '#95a5a6', '#34495e', '#3498db', '#8B4513', '#bdc3c7', '#f39c12', '#e8daef', '#fadbd8', '#abebc6'] :
                ['#2ecc71', '#e74c3c', '#ecf0f1', '#f1c40f', '#9b59b6', '#e67e22', '#ff69b4', '#95a5a6'];

            for (let i = 0; i < aiCount; i++) {
                // 随机初始位置（避开玩家和边界）
                let x, y, valid;
                let attempts = 0;
                do {
                    valid = true;
                    x = 10 + Math.random() * (WORLD_SIZE - 20);
                    y = 10 + Math.random() * (WORLD_SIZE - 20);

                    // 检查是否离玩家太近
                    const playerHead = snake[0];
                    const minDist = gameMode === 'chase' ? 20 : 15; // 大追杀模式保持更远距离
                    if (Math.abs(x - playerHead.x) < minDist && Math.abs(y - playerHead.y) < minDist) {
                        valid = false;
                    }

                    // 大追杀模式：确保AI分布在不同区域
                    if (gameMode === 'chase') {
                        for (let existingAI of aiSnakes) {
                            if (Math.abs(x - existingAI.body[0].x) < 8 && Math.abs(y - existingAI.body[0].y) < 8) {
                                valid = false;
                                break;
                            }
                        }
                    }
                    attempts++;
                } while (!valid && attempts < 50);

                // 大逃杀模式AI长度随机（3-15节），其他模式固定3节
                const initLength = gameMode === 'chase' ? Math.floor(Math.random() * 13) + 3 : 3;
                const body = [];
                for (let j = 0; j < initLength; j++) {
                    body.push({ x: x - j * 0.5, y: y });
                }

                aiSnakes.push({
                    body: body,
                    direction: Math.random() * Math.PI * 2,
                    targetDirection: Math.random() * Math.PI * 2,
                    speed: gameMode === 'chase' ? (0.3 + Math.random() * 0.1) : (0.25 + Math.random() * 0.15), // 大追杀模式AI稍快
                    color: aiColors[i],
                    name: aiNames[i],
                    score: 0,
                    alive: true,
                    changeDirTimer: 0,
                    fleeTimer: 0 // 大追杀模式专用：逃跑计时器
                });
            }
        }

        // 更新AI蛇
        function updateAISnakes() {
            if ((gameMode !== 'battle' && gameMode !== 'chase') || !aiSnakes.length) return;

            // 大追杀模式：不同的AI行为
            if (gameMode === 'chase') {
                updateChaseModeAI();
                return;
            }

            // 大乱斗模式AI行为（原有逻辑）

            aiSnakes.forEach(ai => {
                if (!ai.alive) return;

                ai.changeDirTimer--;

                // 定期改变方向
                if (ai.changeDirTimer <= 0) {
                    // 寻找最近的食物或追踪玩家
                    let target = null;
                    let minDist = Infinity;

                    // 找最近的食物
                    foods.forEach(food => {
                        const dist = Math.sqrt(Math.pow(food.x - ai.body[0].x, 2) + Math.pow(food.y - ai.body[0].y, 2));
                        if (dist < minDist) {
                            minDist = dist;
                            target = food;
                        }
                    });

                    if (target) {
                        // 朝食物方向移动
                        ai.targetDirection = Math.atan2(target.y - ai.body[0].y, target.x - ai.body[0].x);
                    } else {
                        // 随机方向
                        ai.targetDirection = Math.random() * Math.PI * 2;
                    }

                    ai.changeDirTimer = 30 + Math.random() * 60;
                }

                // 平滑转向
                let diff = ai.targetDirection - ai.direction;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                ai.direction += diff * 0.1;

                // 移动
                const dx = Math.cos(ai.direction) * ai.speed;
                const dy = Math.sin(ai.direction) * ai.speed;

                let headX = ai.body[0].x + dx;
                let headY = ai.body[0].y + dy;

                // 边界检测 - 转向
                if (headX < 5 || headX > WORLD_SIZE - 5 || headY < 5 || headY > WORLD_SIZE - 5) {
                    // 朝反方向或垂直方向
                    ai.targetDirection = Math.atan2(WORLD_SIZE/2 - headY, WORLD_SIZE/2 - headX) + (Math.random() - 0.5);
                    ai.changeDirTimer = 10;
                    return;
                }

                // 玩家碰撞检测 - 大乱斗新规则
                const playerHead = snake[0];

                // 头对头碰撞：检测AI头部是否撞到玩家头部
                if (Math.abs(headX - playerHead.x) < 1 && Math.abs(headY - playerHead.y) < 1) {
                    // 头对头碰撞 - 双方同时失败
                    killAISnake(ai, '平局');
                    // 玩家也死亡
                    isGameOver = true;
                    playGameOverSound();
                    killPlayer('头对头碰撞平局!');
                    return;
                }

                // 头对身体碰撞：检测AI头部是否撞到玩家身体
                for (let i = 1; i < snake.length; i++) {
                    if (Math.abs(headX - snake[i].x) < 1 && Math.abs(headY - snake[i].y) < 1) {
                        // AI头部撞到玩家身体，AI失败，玩家存活
                        killAISnake(ai, '你');
                        playComboSound(2);
                        return;
                    }
                }

                // AI之间碰撞检测 - 大乱斗新规则
                for (let otherAI of aiSnakes) {
                    if (otherAI === ai || !otherAI.alive) continue;

                    // 头对头碰撞：检测AI头部是否撞到其他AI头部
                    if (Math.abs(headX - otherAI.body[0].x) < 1 && Math.abs(headY - otherAI.body[0].y) < 1) {
                        // 头对头碰撞 - 双方同时失败
                        killAISnake(otherAI, '平局');
                        killAISnake(ai, '平局');
                        return;
                    }

                    // 头对身体碰撞：检测AI头部是否撞到其他AI身体
                    for (let j = 1; j < otherAI.body.length; j++) {
                        if (Math.abs(headX - otherAI.body[j].x) < 1 && Math.abs(headY - otherAI.body[j].y) < 1) {
                            // AI头部撞到其他AI身体，主动撞击方失败
                            killAISnake(ai, otherAI.name);
                            return;
                        }
                    }
                }

                // 吃食物
                let ateFood = false;
                for (let i = foods.length - 1; i >= 0; i--) {
                    const food = foods[i];
                    const dist = Math.sqrt(Math.pow(food.x - headX, 2) + Math.pow(food.y - headY, 2));
                    if (dist < 1) {
                        ai.score += food.value * 10;
                        ai.body.unshift({ x: headX, y: headY });
                        if (ai.body.length > 3 + ai.score / 100) {
                            ai.body.pop();
                        }
                        foods.splice(i, 1);
                        ateFood = true;
                    }
                }

                // 移动
                if (!ateFood) {
                    ai.body.unshift({ x: headX, y: headY });
                    ai.body.pop();
                } else {
                    ai.body.unshift({ x: headX, y: headY });
                }
            });
        }

        // 大逃杀模式AI行为 - 逃跑优先
        function updateChaseModeAI() {
            const playerHead = snake[0];
            const aiSettings = CHASE_AI_DIFFICULTY[chaseAIDifficulty];

            aiSnakes.forEach(ai => {
                if (!ai.alive) return;

                ai.changeDirTimer--;
                ai.fleeTimer--;

                // 计算与玩家的距离
                const distToPlayer = Math.sqrt(
                    Math.pow(ai.body[0].x - playerHead.x, 2) +
                    Math.pow(ai.body[0].y - playerHead.y, 2)
                );

                // 危险距离阈值（根据难度调整）
                const dangerDist = aiSettings.fleeRange;

                // 定期更新逃跑方向
                if (ai.changeDirTimer <= 0 || distToPlayer < dangerDist) {
                    // 逃跑方向：远离玩家
                    let fleeDir = Math.atan2(ai.body[0].y - playerHead.y, ai.body[0].x - playerHead.x);

                    // 添加随机扰动（根据难度调整）
                    fleeDir += (Math.random() - 0.5) * aiSettings.randomChance;

                    // 检查逃跑方向是否安全（不会撞墙）
                    const testX = ai.body[0].x + Math.cos(fleeDir) * 3;
                    const testY = ai.body[0].y + Math.sin(fleeDir) * 3;

                    if (testX < 5 || testX > WORLD_SIZE - 5 || testY < 5 || testY > WORLD_SIZE - 5) {
                        // 逃跑方向会撞墙，尝试其他方向
                        const angles = [-Math.PI/2, Math.PI/2, Math.PI, 0, Math.PI/4, -Math.PI/4];
                        for (let angle of angles) {
                            const newDir = fleeDir + angle;
                            const tx = ai.body[0].x + Math.cos(newDir) * 3;
                            const ty = ai.body[0].y + Math.sin(newDir) * 3;
                            if (tx > 5 && tx < WORLD_SIZE - 5 && ty > 5 && ty < WORLD_SIZE - 5) {
                                fleeDir = newDir;
                                break;
                            }
                        }
                    }

                    // 检查是否会被其他AI碰撞
                    for (let otherAI of aiSnakes) {
                        if (otherAI === ai || !otherAI.alive) continue;
                        const otherDist = Math.sqrt(
                            Math.pow(ai.body[0].x + Math.cos(fleeDir) * 3 - otherAI.body[0].x, 2) +
                            Math.pow(ai.body[0].y + Math.sin(fleeDir) * 3 - otherAI.body[0].y, 2)
                        );
                        if (otherDist < 3) {
                            // 会被其他AI撞到，尝试绕过
                            fleeDir += Math.PI / 2;
                        }
                    }

                    ai.targetDirection = fleeDir;
                    ai.changeDirTimer = 10 + Math.random() * 15; // 根据难度调整更新频率
                }

                // 平滑转向（根据难度调整）
                let diff = ai.targetDirection - ai.direction;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                ai.direction += diff * aiSettings.turnSpeed;

                // 移动速度根据难度调整
                const dx = Math.cos(ai.direction) * aiSettings.speed;
                const dy = Math.sin(ai.direction) * aiSettings.speed;

                let headX = ai.body[0].x + dx;
                let headY = ai.body[0].y + dy;

                // 边界检测 - 强制转向
                if (headX < 5 || headX > WORLD_SIZE - 5 || headY < 5 || headY > WORLD_SIZE - 5) {
                    // 朝地图中心方向
                    ai.targetDirection = Math.atan2(WORLD_SIZE/2 - headY, WORLD_SIZE/2 - headX);
                    ai.changeDirTimer = 5;
                    return;
                }

                // AI头部撞到玩家身体检测（大追杀规则）
                // 这是AI的"反击" - 如果AI主动撞到玩家，玩家死亡
                // 无敌时间内不判定失败
                if (!isInvincible) {
                    for (let i = 0; i < snake.length; i++) {
                        if (Math.abs(headX - snake[i].x) < 1 && Math.abs(headY - snake[i].y) < 1) {
                            // AI撞到玩家身体，玩家失败
                            playGameOverSound();
                            killPlayer('被' + ai.name + '反击!');
                            return;
                        }
                    }
                }

                // AI之间互相躲避（不判定失败）
                for (let otherAI of aiSnakes) {
                    if (otherAI === ai || !otherAI.alive) continue;

                    // 撞到其他AI时只是转向躲避，不判定失败
                    // 计算距离，如果太近则转向
                    const distToOther = Math.sqrt(
                        Math.pow(headX - otherAI.body[0].x, 2) +
                        Math.pow(headY - otherAI.body[0].y, 2)
                    );

                    if (distToOther < 3) {
                        // 距离太近，尝试转向远离对方
                        const fleeFromOther = Math.atan2(headY - otherAI.body[0].y, headX - otherAI.body[0].x);
                        ai.targetDirection = fleeFromOther;
                        ai.direction = fleeFromOther;
                    }
                }

                // AI可以吃食物（被击杀的AI变成的食物）
                let ateFood = false;
                for (let i = foods.length - 1; i >= 0; i--) {
                    const food = foods[i];
                    const dist = Math.sqrt(Math.pow(food.x - headX, 2) + Math.pow(food.y - headY, 2));
                    if (dist < 1) {
                        ai.score += food.value * 10;
                        ai.body.unshift({ x: headX, y: headY });
                        if (ai.body.length > 3 + ai.score / 100) {
                            ai.body.pop();
                        }
                        foods.splice(i, 1);
                        ateFood = true;
                    }
                }

                // 移动
                if (!ateFood) {
                    ai.body.unshift({ x: headX, y: headY });
                    ai.body.pop();
                } else {
                    ai.body.unshift({ x: headX, y: headY });
                }
            });
        }

        // 重新生成AI蛇
        function respawnAISnake() {
            if (gameMode !== 'battle') return;

            const aliveCount = aiSnakes.filter(ai => ai.alive).length;
            if (aliveCount >= AI_SNAKE_COUNT) return;

            const aiNames = ['小青', '小红', '小白', '小黄', '小紫', '小橙', '小粉', '小灰'];
            const aiColors = ['#2ecc71', '#e74c3c', '#ecf0f1', '#f1c40f', '#9b59b6', '#e67e22', '#ff69b4', '#95a5a6'];

            // 找到死亡蛇的索引位置，重新生成
            for (let i = 0; i < aiSnakes.length; i++) {
                if (!aiSnakes[i].alive) {
                    // 随机初始位置（避开玩家和其他AI）
                    let x, y, valid;
                    let attempts = 0;
                    do {
                        valid = true;
                        x = 10 + Math.random() * (WORLD_SIZE - 20);
                        y = 10 + Math.random() * (WORLD_SIZE - 20);

                        // 检查是否离玩家太近
                        const playerHead = snake[0];
                        if (Math.abs(x - playerHead.x) < 15 && Math.abs(y - playerHead.y) < 15) {
                            valid = false;
                        }

                        // 检查是否离其他AI太近
                        for (let otherAI of aiSnakes) {
                            if (otherAI.alive && Math.abs(x - otherAI.body[0].x) < 10 && Math.abs(y - otherAI.body[0].y) < 10) {
                                valid = false;
                                break;
                            }
                        }
                        attempts++;
                    } while (!valid && attempts < 50);

                    aiSnakes[i] = {
                        body: [
                            { x: x, y: y },
                            { x: x - 3, y: y },
                            { x: x - 6, y: y }
                        ],
                        direction: Math.random() * Math.PI * 2,
                        targetDirection: Math.random() * Math.PI * 2,
                        speed: 0.25 + Math.random() * 0.15,
                        color: aiColors[i],
                        name: aiNames[i],
                        score: 0,
                        alive: true,
                        changeDirTimer: 0
                    };

                    // 显示重生提示
                    scorePopups.push({
                        x: x,
                        y: y - 2,
                        score: aiNames[i] + '重新入场!',
                        life: 1.5,
                        color: '#2ecc71',
                        isKillText: true
                    });
                    break;
                }
            }
        }

        // AI蛇死亡转换为食物
        function killAISnake(deadAI, killerName) {
            deadAI.alive = false;

            // 在死亡位置生成食物（根据长度）
            const foodCount = Math.min(deadAI.body.length, 10);
            for (let i = 0; i < foodCount; i++) {
                const pos = deadAI.body[Math.floor(Math.random() * deadAI.body.length)];
                const foodType = FOOD_COLORS[Math.floor(Math.random() * FOOD_COLORS.length)];
                foods.push({
                    x: pos.x + (Math.random() - 0.5) * 2,
                    y: pos.y + (Math.random() - 0.5) * 2,
                    emoji: foodType.emoji,
                    color: foodType.color,
                    glow: foodType.glow,
                    value: foodType.value,
                    pulse: Math.random() * Math.PI * 2,
                    isDeadSnake: true // 标记为死亡蛇转换的食物
                });
            }

            // 大逃杀模式：击杀特效
            if (gameMode === 'chase') {
                // 屏幕闪烁效果
                const canvas = document.getElementById('gameCanvas');
                canvas.style.transition = 'filter 0.1s';
                canvas.style.filter = 'brightness(1.5)';
                setTimeout(() => {
                    canvas.style.filter = 'brightness(1)';
                }, 100);

                // 播放击杀音效
                playKillSound();
            }

            // 显示击杀提示
            scorePopups.push({
                x: deadAI.body[0].x,
                y: deadAI.body[0].y - 2,
                score: killerName + '击杀了' + deadAI.name + '!',
                life: 2,
                color: '#ff4757',
                isKillText: true
            });
        }

        // 击杀音效
        function playKillSound() {
            if (!audioCtx) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

        // 绘制AI蛇
        function drawAISnakes() {
            if ((gameMode !== 'battle' && gameMode !== 'chase') || !aiSnakes.length) return;

            aiSnakes.forEach(ai => {
                if (!ai.alive) return;

                // 绘制AI蛇
                ai.body.forEach((seg, i) => {
                    const x = seg.x * GRID_SIZE - camera.x + GRID_SIZE/2;
                    const y = seg.y * GRID_SIZE - camera.y + GRID_SIZE/2;

                    if (x < -GRID_SIZE || x > canvas.width + GRID_SIZE ||
                        y < -GRID_SIZE || y > canvas.height + GRID_SIZE) return;

                    const size = GRID_SIZE - 4;
                    const radius = 6;

                    ctx.save();
                    if (i === 0) {
                        // 头部
                        ctx.fillStyle = ai.color;
                        ctx.shadowColor = ai.color;
                        ctx.shadowBlur = 15;
                    } else {
                        ctx.fillStyle = ai.color;
                        ctx.globalAlpha = 0.7 - i * 0.05;
                    }

                    ctx.beginPath();
                    ctx.roundRect(x - size/2, y - size/2, size, size, radius);
                    ctx.fill();
                    ctx.restore();

                    // AI蛇头部添加眼睛（与玩家蛇相同）
                    if (i === 0) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(ai.direction);

                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(4, -4, 3, 0, Math.PI * 2);
                        ctx.arc(4, 4, 3, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(5, -3, 1.5, 0, Math.PI * 2);
                        ctx.arc(5, 3, 1.5, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();
                    }
                });

                // 显示AI名字和分数
                const headX = ai.body[0].x * GRID_SIZE - camera.x;
                const headY = ai.body[0].y * GRID_SIZE - camera.y - 15;
                if (headY > 0) {
                    ctx.font = 'bold 12px Arial';
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.fillText(ai.name + '(' + ai.score + ')', headX + GRID_SIZE/2, headY);
                }
            });
        }

        // 音效系统
        let audioCtx = null;
        let bgMusicStarted = false;
        let bgMusicInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            // 预加载语音（触发语音合成初始化）
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
            // 开始背景音乐
            startBackgroundMusic();
        }

        // 全屏函数
        let bgMusicAudio = null;
        let bgMusicOriginalVolume = 0.3;

        function startBackgroundMusic() {
            // 如果已经有音乐对象，直接尝试播放
            if (bgMusicAudio) {
                if (bgMusicAudio.paused) {
                    bgMusicAudio.play().catch(() => {});
                }
                return;
            }
            if (!audioCtx) return;

            // 创建新的音乐对象
            bgMusicAudio = new Audio('./asserts/audio/game_mario5.mp3');
            bgMusicAudio.loop = true;
            bgMusicAudio.volume = bgMusicOriginalVolume;
            bgMusicAudio.play().catch(e => console.log('播放背景音乐失败:', e));

            // 监听暂停状态自动恢复
            bgMusicAudio.onpause = () => {
                if (isRunning) {
                    bgMusicAudio.play().catch(() => {});
                }
            };
        }

        // 降低背景音乐音量（播放特效音时调用）
        function lowerBgMusic() {
            if (bgMusicAudio && bgMusicAudio.volume > 0.1) {
                bgMusicAudio.volume = 0.1;
            }
        }

        // 恢复背景音乐音量
        function restoreBgMusic() {
            if (bgMusicAudio) {
                bgMusicAudio.volume = bgMusicOriginalVolume;
            }
        }

        function stopBackgroundMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
            if (bgMusicAudio) {
                bgMusicAudio.pause();
                bgMusicAudio = null;
            }
        }

        function playEatSound() {
            if (!audioCtx) return;
            lowerBgMusic();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);

                // 音效结束后恢复背景音乐
                setTimeout(() => { restoreBgMusic(); }, 200);
            } catch(e) {}
        }

        // 连杀语音提示（使用 Web Speech API）
        function playKillVoice(comboCount) {
            try {
                if (!('speechSynthesis' in window)) {
                    console.log('Speech synthesis not supported');
                    return;
                }

                // 停止之前的语音
                window.speechSynthesis.cancel();

                // 根据连击数选择语音
                let text = '';
                if (comboCount === 2) {
                    text = 'Double Kill 双杀';
                } else if (comboCount === 3) {
                    text = 'Triple Kill 三杀';
                } else if (comboCount === 4) {
                    text = 'Quadra Kill 四杀';
                } else if (comboCount === 5) {
                    text = 'Penta Kill 五杀';
                } else if (comboCount >= 6) {
                    text = '超神';
                }

                if (text) {
                    // 使用延迟确保语音能播放
                    setTimeout(() => {
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'zh-CN';
                        utterance.rate = 1.0;
                        utterance.pitch = 1.0;
                        utterance.volume = 1.0;
                        window.speechSynthesis.speak(utterance);
                    }, 50);
                }
            } catch(e) {
                console.log('语音播放失败:', e);
            }
        }

        // 连击音效 - 游戏风格
        function playComboSound(comboCount) {
            showKillText(comboCount); // 显示连杀文字

            if (!audioCtx) return;
            lowerBgMusic();

            try {
                // 创建多个振荡器叠加
                const now = audioCtx.currentTime;

                if (comboCount === 2) {
                    // Double Kill - 双音上升
                    playTone(523, 0.1, now, 'square', 0.3);
                    playTone(659, 0.15, now + 0.1, 'square', 0.3);
                } else if (comboCount === 3) {
                    // Triple Kill - 三音上升
                    playTone(523, 0.1, now, 'square', 0.35);
                    playTone(659, 0.1, now + 0.1, 'square', 0.35);
                    playTone(784, 0.2, now + 0.2, 'square', 0.35);
                } else if (comboCount === 4) {
                    // Quadra Kill - 四音上升更强
                    playTone(523, 0.1, now, 'square', 0.4);
                    playTone(659, 0.1, now + 0.08, 'square', 0.4);
                    playTone(784, 0.1, now + 0.16, 'square', 0.4);
                    playTone(880, 0.25, now + 0.24, 'square', 0.4);
                } else if (comboCount >= 5) {
                    // Penta Kill / 超神 - 五音+震撼
                    playTone(523, 0.08, now, 'square', 0.45);
                    playTone(659, 0.08, now + 0.06, 'square', 0.45);
                    playTone(784, 0.08, now + 0.12, 'square', 0.45);
                    playTone(880, 0.08, now + 0.18, 'square', 0.45);
                    playTone(1047, 0.4, now + 0.24, 'sawtooth', 0.45);
                }
            } catch(e) {}
        }

        // 辅助函数：播放单音
        function playTone(freq, duration, time, type, volume) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(volume, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + duration);
        }

        // 食物类型（emoji + 颜色）
        const FOOD_COLORS = [
            // 普通食物（1分）

            { emoji: '🍐', color: '#c8e6c9', glow: '#a5d6a7', value: 1 },
